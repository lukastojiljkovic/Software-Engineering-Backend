spring.application.name=banka2_bek

spring.datasource.url=jdbc:postgresql://localhost:5433/banka2
spring.datasource.username=banka2user
spring.datasource.password=banka2pass
spring.datasource.driver-class-name=org.postgresql.Driver

# Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
# Booleane mapiramo kao INTEGER u bazi (0/1) da seed.sql ostane citljiv
# i izbegnemo eksplozivnu konverziju '0'/'1' -> 'false'/'true' literala.
spring.jpa.properties.hibernate.type.preferred_boolean_jdbc_type=INTEGER

# Server 
server.port=8080

# Mail (override in application-local.properties or env)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.ssl.trust=smtp.gmail.com

# NOTE: In production, externalize secrets (JWT, mail password, API keys) via environment variables or a vault.
# Notification Sender email address & 16-char-key
spring.mail.username=banka2.notifications@gmail.com
spring.mail.password=rsiw tchm zojl oomw

# Notification URLs (for links in emails) — all bases below are frontend origins (frontend routes)
notification.activation-url-base=http://localhost:3000
notification.password-reset-url-base=http://localhost:3000

# Path on frontend for password reset form (placeholder for until front is built);
# reset link = password-reset-url-base + path + ?token=...
notification.password-reset-page-path=/reset-password

# Path for account activation page (link in email = activation-url-base + path + ?token=...).
# Frontend page at this path should submit the token to POST /auth-employee/activate.
notification.activation-page-path=/activate-account

