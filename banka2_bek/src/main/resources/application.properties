spring.application.name=banka2_bek

# Database — sve preko env vars sa dev fallback-ovima radi `mvn spring-boot:run`.
# U produkciji se sva 4 env var-a moraju postaviti (najmanje DB_PASSWORD).
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5433/banka2}
spring.datasource.username=${DB_USER:banka2user}
spring.datasource.password=${DB_PASSWORD:banka2pass}
spring.datasource.driver-class-name=org.postgresql.Driver

# Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
# Booleane mapiramo kao INTEGER u bazi (0/1) da seed.sql ostane citljiv
# i izbegnemo eksplozivnu konverziju '0'/'1' -> 'false'/'true' literala.
spring.jpa.properties.hibernate.type.preferred_boolean_jdbc_type=INTEGER

# Server
server.port=8080

# Fixer.io API key — MORA biti postavljen preko env var ${EXCHANGE_API_KEY}.
# SEC-01: Kljuc je izvucen iz repo-a (bezbednosni audit 25.05.2026). Ako je
# EXCHANGE_API_KEY prazno, ExchangeService pada graciozno na fallback kurseve
# (NBS-bazirani statics) — Fixer.io API ne sme da bude pozvan bez key-a.
# Lokalni dev: postaviti EXCHANGE_API_KEY u .env ili shell pre `docker compose up`.
# Production: rotirati key preko CI/CD secrets.
exchange.api.key=${EXCHANGE_API_KEY:}
exchange.api.url=https://data.fixer.io/api/latest

# NAPOMENA (pod-faza 2f cutover): `stock.api.*` (Alpha Vantage) je iseljen u
# `trading-service` zajedno sa berzanskim katalogom — uklonjeno iz monolita.

# Bank identification (registration number of the bank's company entity)
bank.registration-number=22200022

# State identification (registration number for tax collection — Republika Srbija)
state.registration-number=17858459

# ============================================================================
# MONITORING / METRIKE (Actuator + Prometheus)
# ============================================================================
# Endpoint-i izlozeni za Prometheus scrape + standardno health/info introspection.
# /actuator/prometheus dolazi u Prometheus exposition formatu, scrape-uje ga
# Prometheus svake 15s. /actuator/health vraca aggregate status svih health
# indicator-a (DB, mail, custom...).
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=when-authorized
management.endpoint.prometheus.access=read-only

# Kubernetes readiness/liveness probes — /actuator/health/liveness i /actuator/health/readiness
# se izlazu kao zasebni endpoint-i (Spring Boot 2.3+). Liveness = "JVM zivi", Readiness =
# "spreman za saobracaj". K8s kubelet ih pinguje za pod lifecycle management.
management.endpoint.health.probes.enabled=true
management.health.livenessstate.enabled=true
management.health.readinessstate.enabled=true

# Application label — sve metrike automatski dobijaju ovaj tag, sto u Grafani
# omogucava grupisanje i alerting po servisu (kasnije kad imamo vise servisa).
management.metrics.tags.application=banka2_backend

# Histogram-i za HTTP request-ove (potrebni za p95/p99 latency dashboard-e i alert-e).
management.metrics.distribution.percentiles-histogram.http.server.requests=true
management.metrics.distribution.percentiles.http.server.requests=0.5,0.95,0.99

# NAPOMENA (pod-faza 2f cutover): InfluxDB konfiguracija (`banka2.influx.*`) je
# iseljena u `trading-service` — `timeseries` paket (jedini consumer) sada zivi
# tamo. Monolit vise ne pristupa InfluxDB-u.

# JWT signing key — minimum 256-bit (32 bajta) za HS256.
# U produkciji se MORA postaviti ${JWT_SECRET} (build pada bez njega zbog
# Keys.hmacShaKeyFor validacije). Dev fallback je 60 bajta (480-bit) i koristi
# se samo lokalno; nikada ne sme biti pushovan u javni env. Rotacija: setujemo
# nov secret, restartujemo BE — svi postojeci JWT-ovi se invalidiraju.
jwt.secret=${JWT_SECRET:dev-only-jwt-secret-do-not-use-in-prod-rotate-via-env-var-on-each-deploy}

# Account lockout (brute-force protection per email)
auth.lockout.max-failed-attempts=5
auth.lockout.lock-duration-minutes=10

# OTP configuration
otp.expiry-minutes=5
otp.max-attempts=3

# NAPOMENA (pod-faza 2f cutover): order execution tuning (`orders.execution.*`,
# `orders.afterhours.*`) je iseljen u `trading-service` — `order` paket
# (OrderScheduler + fill engine) sada zivi tamo.

# ============================================================================
# ARBITRO LLM ASISTENT (Celina 6 — Info o predmetu/LLM_Asistent_Plan.txt v3.3)
# ============================================================================
# Default provider je Ollama u Docker network-u (servis "ollama") — pull model-a
# auto-startuje preko `ollama-pull` one-shot kontejnera u docker-compose.
# Za lokalni dev bez Docker-a, override-uj na http://localhost:11434/v1 ili
# http://host.docker.internal:11434/v1 u application-local.properties.
#
# K8s deploy: svi assistant.* su wrap-ovani u ${VAR:default} sintaksi, pa se
# overriduju preko ConfigMap (ARBITRO_* env-ovi) bez rebuild-a image-a.
assistant.enabled=${ARBITRO_ENABLED:true}
assistant.name=${ARBITRO_NAME:Arbitro}
assistant.provider=${ARBITRO_PROVIDER:ollama}
assistant.base-url=${ARBITRO_BASE_URL:http://host.docker.internal:11434/v1}
# Pokazuje na derivat modela koji ollama-pull init kontejner kreira sa
# Modelfile PARAMETER num_gpu 999 — forsira sve layer-e u VRAM (8GB)
# umesto 26-30% auto-split-a (3GB) koji je default. Ako derivat ne
# postoji, override-uj na "gemma4:e2b" za fallback. Razlog: Ollama 0.5+
# je uklonio OLLAMA_NUM_GPU env var, jedini nacin za 100% GPU offload
# je preko Modelfile-a ili request options (options.num_gpu=999).
assistant.model=${ARBITRO_MODEL:gemma4:e2b-gpu}
assistant.api-key=${ARBITRO_API_KEY:ollama}
# v3.5: 2048 → 8192 jer je Luka prijavio "kad dobaci limit dobije se network error".
# Gemma 4 E4B podrzava 128K context window — 8192 je samo response cap, daje detaljnije
# odgovore + agentic preview rezultate. Moze se override-ovati na vise (do 32768) za
# izrazito kompleksne agentic flow-ove.
assistant.max-tokens=${ARBITRO_MAX_TOKENS:8192}
# Gemma 4 preporuka iz model card-a: 1.0 / 0.95 / 64 (NE 0.7 kao kod drugih)
assistant.temperature=${ARBITRO_TEMPERATURE:1.0}
assistant.top-p=${ARBITRO_TOP_P:0.95}
assistant.top-k=${ARBITRO_TOP_K:64}
assistant.context-window=${ARBITRO_CONTEXT_WINDOW:32768}
assistant.timeout-ms=${ARBITRO_TIMEOUT_MS:120000}
assistant.rate-limit-per-user-per-min=${ARBITRO_RATE_LIMIT_PER_USER_PER_MIN:20}
assistant.conversation-retention-days=${ARBITRO_CONVERSATION_RETENTION_DAYS:7}
assistant.history-window-size=${ARBITRO_HISTORY_WINDOW_SIZE:8}
assistant.health-check-interval-seconds=${ARBITRO_HEALTH_CHECK_INTERVAL_SECONDS:60}
# Reasoning (FE NIKAD ne vidi sirov thinking content — Claude Code stil)
assistant.reasoning.enabled=${ARBITRO_REASONING_ENABLED:true}
assistant.reasoning.heuristic=${ARBITRO_REASONING_HEURISTIC:true}
assistant.reasoning.budget-tokens=${ARBITRO_REASONING_BUDGET_TOKENS:2048}
# Tools
assistant.tools.enabled=${ARBITRO_TOOLS_ENABLED:true}
assistant.tools.max-iterations=${ARBITRO_TOOLS_MAX_ITERATIONS:5}
assistant.tools.wikipedia.url=${ARBITRO_TOOLS_WIKIPEDIA_URL:http://host.docker.internal:8090}
assistant.tools.wikipedia.timeout-ms=${ARBITRO_TOOLS_WIKIPEDIA_TIMEOUT_MS:10000}
assistant.tools.rag.url=${ARBITRO_TOOLS_RAG_URL:http://host.docker.internal:8091}
assistant.tools.rag.timeout-ms=${ARBITRO_TOOLS_RAG_TIMEOUT_MS:8000}
assistant.tools.calculator.enabled=${ARBITRO_TOOLS_CALCULATOR_ENABLED:true}
# Phase 5 — Kokoro-82M TTS sidecar (Apache 2.0). Lokalno hostovan na 8092.
assistant.tools.tts.enabled=${ARBITRO_TOOLS_TTS_ENABLED:true}
assistant.tools.tts.url=${ARBITRO_TOOLS_TTS_URL:http://host.docker.internal:8092}
assistant.tools.tts.timeout-ms=${ARBITRO_TOOLS_TTS_TIMEOUT_MS:60000}
assistant.tools.tts.default-voice=${ARBITRO_TOOLS_TTS_DEFAULT_VOICE:af_bella}
assistant.tools.tts.default-lang=${ARBITRO_TOOLS_TTS_DEFAULT_LANG:en-us}

# Phase 5 — Whisper STT sidecar (faster-whisper, MIT). Lokalno hostovan,
# host port 8094 -> container port 8093 (8093 vec zauzeto na host-u od
# alert_router servisa u prometheus stack-u).
# Server-side ASR — kad korisnik salje audio kroz /assistant/chat-multipart, BE
# transkribuje kroz Whisper umesto da prosledi audio Gemmi (Ollama 0.23.2 jos
# nema audio multimodal podrsku za Gemma 4 — issue ollama#15333). Whisper tiny
# model (~75MB int8) handluje srpski + engleski mixed govor na CPU za ~2-3s.
arbitro.whisper.url=${ARBITRO_WHISPER_URL:http://host.docker.internal:8094}
arbitro.whisper.enabled=${ARBITRO_WHISPER_ENABLED:true}
arbitro.whisper.timeout-ms=${ARBITRO_WHISPER_TIMEOUT_MS:30000}
# MVP: 4 interna alata. Phase 2 ce omogucti preostala 3 (vidi plan §10.2).
assistant.tools.internal.balance-summary=${ARBITRO_TOOLS_INTERNAL_BALANCE_SUMMARY:true}
assistant.tools.internal.recent-orders=${ARBITRO_TOOLS_INTERNAL_RECENT_ORDERS:true}
assistant.tools.internal.exchange-rate=${ARBITRO_TOOLS_INTERNAL_EXCHANGE_RATE:true}
assistant.tools.internal.calculator=${ARBITRO_TOOLS_INTERNAL_CALCULATOR:true}
assistant.tools.internal.portfolio-summary=${ARBITRO_TOOLS_INTERNAL_PORTFOLIO_SUMMARY:false}
assistant.tools.internal.active-otc-offers=${ARBITRO_TOOLS_INTERNAL_ACTIVE_OTC_OFFERS:false}
assistant.tools.internal.loan-summary=${ARBITRO_TOOLS_INTERNAL_LOAN_SUMMARY:false}

# Phase 4 v3.5: Agentic mode (write tool-ovi sa preview+confirm flow-om).
# enabled=false prebacuje sistem u read-only — chat ostaje funkcionalan ali
# write handler-i se ne registruju. enabledByDefault=false znaci da svaki
# korisnik mora EXPLICITNO ukljuciti agentic toggle u Arbitro Settings dropdown-u.
assistant.agentic.enabled=${ARBITRO_AGENTIC_ENABLED:true}
assistant.agentic.enabled-by-default=${ARBITRO_AGENTIC_ENABLED_BY_DEFAULT:false}
assistant.agentic.action-ttl-min=${ARBITRO_AGENTIC_ACTION_TTL_MIN:5}
assistant.agentic.rate-limit-per-min=${ARBITRO_AGENTIC_RATE_LIMIT_PER_MIN:5}
# Cron izraz Spring Scheduler-a — svake minute (0 sekundi, svaki minut)
assistant.agentic.expiration-schedule-cron=${ARBITRO_AGENTIC_EXPIRATION_SCHEDULE_CRON:0 * * * * *}

# ============================================================================
# INTER-BANK ROUTING (Celina 5 — T6 BankRoutingService + InterbankAuthFilter)
# ============================================================================
# Routing number = prve 3 cifre svakog naseg racuna. Mi smo 222.
interbank.my-routing-number=222
interbank.my-bank-display-name=Banka 2

# Partner banka #1 (Tim 1). Routing 111.
# Konfiguracija mora biti uskladjena sa Tim 1 — kontakt: zajednicki Discord/Teams.
interbank.partners[0].routing-number=${PARTNER1_ROUTING:111}
interbank.partners[0].display-name=${PARTNER1_NAME:Banka 1}
# Base URL ka Tim 1 BE-u. Trailing slash se normalizuje u InterbankClient.normalizeBaseUrl().
interbank.partners[0].base-url=${PARTNER1_BASE_URL:http://localhost:9999}
# Inbound token: token koji MI izdajemo Tim 1; oni ga saalju u X-Api-Key kad nas zovu.
# Tim 1 u svom outbound-token = "dev-outbound-banka1-to-banka2" — to oni saljali nama.
interbank.partners[0].inbound-token=${PARTNER1_INBOUND_TOKEN:dev-outbound-banka1-to-banka2}
# Outbound token: token koji Tim 1 izdaje nama; MI saljemo u X-Api-Key kad ih zovemo.
# Tim 1 u svom inbound-token = "dev-inbound-banka2-to-banka1" — to oni ocekuju od nas.
interbank.partners[0].outbound-token=${PARTNER1_OUTBOUND_TOKEN:dev-inbound-banka2-to-banka1}
# §3.7 path override: spec kaze "/user/{rn}/{id}" ali Tim 1 je rerouted-ovao
# endpoint na "/interbank/user/{rn}/{id}" zbog internih path collision-a sa svojom
# frontend /user/* rutom. Override po partneru — bez ovog, dobijali bismo 404 pri
# user info lookup-u (verifikovano kroz audit njihovog UserDisplayController.java).
interbank.partners[0].user-info-path=${PARTNER1_USER_PATH:/interbank/user/{rn}/{id}}

# NAPOMENA (pod-faza 2f cutover): `bank.owner-client-email` (banka kao
# investitor u sopstvene fondove — T12) je iseljen u `trading-service`
# zajedno sa `investmentfund` paketom.

# ============================================================================
# RABBITMQ (Faza 1 - notifikacioni kanal ka notification-service)
# ============================================================================
spring.rabbitmq.host=${SPRING_RABBITMQ_HOST:localhost}
spring.rabbitmq.port=${SPRING_RABBITMQ_PORT:5672}
spring.rabbitmq.username=${SPRING_RABBITMQ_USERNAME:guest}
spring.rabbitmq.password=${SPRING_RABBITMQ_PASSWORD:guest}

# ============================================================================
# INTERNI API (Faza 2 - /internal/** seam ka trading-service)
# ============================================================================
internal.api-key=${INTERNAL_API_KEY:dev-internal-key-rotate-in-prod}

# Faza 2f — banka-core interbank paket zove trading-service /internal/portfolio/**
# (portfolios/listings tabele zive u trading_db posle cutover-a).
tradingservice.base-url=${TRADINGSERVICE_BASE_URL:http://localhost:8082}


