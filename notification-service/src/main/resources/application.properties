spring.application.name=notification-service
server.port=8083
management.endpoints.web.exposure.include=health,info

# Mail (SMTP) - preseljeno iz monolita. MAIL_PASSWORD se postavlja preko env-a.
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.ssl.trust=smtp.gmail.com
spring.mail.username=${MAIL_USERNAME:banka2.notifications@gmail.com}
spring.mail.password=${MAIL_PASSWORD:}

# URL baze za linkove u email-ovima (frontend rute)
notification.activation-url-base=${NOTIFICATION_ACTIVATION_URL_BASE:http://localhost:3000}
notification.password-reset-url-base=${NOTIFICATION_PASSWORD_RESET_URL_BASE:http://localhost:3000}
notification.password-reset-page-path=/reset-password
notification.activation-page-path=/activate-account

# RabbitMQ
spring.rabbitmq.host=${SPRING_RABBITMQ_HOST:localhost}
spring.rabbitmq.port=${SPRING_RABBITMQ_PORT:5672}
spring.rabbitmq.username=${SPRING_RABBITMQ_USERNAME:guest}
spring.rabbitmq.password=${SPRING_RABBITMQ_PASSWORD:guest}
