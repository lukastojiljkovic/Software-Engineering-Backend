spring.application.name=trading-service
server.port=8082
management.endpoints.web.exposure.include=health,info,prometheus

# ── Baza: trading_db (sopstvena, shared-nothing) ────────────────────────────
spring.datasource.url=${TRADING_DB_URL:jdbc:postgresql://localhost:6435/trading}
spring.datasource.username=${TRADING_DB_USER:tradinguser}
spring.datasource.password=${TRADING_DB_PASSWORD:tradingpass}
spring.datasource.driver-class-name=org.postgresql.Driver

# ── Hibernate (isto kao monolit: boolean → INTEGER radi citljivog seed-a) ────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.type.preferred_boolean_jdbc_type=INTEGER

# ── JWT: deljeni secret sa banka-core (HS256). Trading-service NEMA bazu
#    korisnika — validira potpis + isticanje lokalno i gradi security context
#    iz claim-ova (sub, role, active). Secret MORA biti identican monolitovom. ─
jwt.secret=${JWT_SECRET:dev-only-jwt-secret-do-not-use-in-prod-rotate-via-env-var-on-each-deploy}

# ── banka-core interni seam: BankaCoreClient zove /internal/funds/** ─────────
bankacore.base-url=${BANKACORE_BASE_URL:http://localhost:8081}
internal.api-key=${INTERNAL_API_KEY:dev-internal-key-rotate-in-prod}
