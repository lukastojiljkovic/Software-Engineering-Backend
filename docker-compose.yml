services:
  db:
    image: postgres:16-alpine
    container_name: banka2_db
    environment:
      POSTGRES_DB: banka2
      POSTGRES_USER: banka2user
      POSTGRES_PASSWORD: banka2pass
    ports:
      # 5433 je rezervisan od Hyper-V port range-a na nekim Windows masinama —
      # 6433 host-side mapira na 5432 u kontejneru. BE komunicira preko Docker
      # network-a (db:5432), pa host port utice samo na host pristup (Adminer
      # ce raditi preko ADMINER_DEFAULT_SERVER=db, ne preko host port-a).
      - "6433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # Init scripts se izvrsavaju samo pri PRVOM boot-u (kada je data dir prazan).
      # Postavlja replication user-a, replication slot, i pg_hba pravila — sve sto
      # treba primary-ju da bi mogao da prima konekcije od read replice.
      - ./db-init:/docker-entrypoint-initdb.d:ro
    command:
      - "postgres"
      - "-c"
      - "wal_level=replica"
      - "-c"
      - "max_wal_senders=5"
      - "-c"
      - "max_replication_slots=5"
      - "-c"
      - "hot_standby=on"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U banka2user -d banka2"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Streaming read replika — pg_basebackup pri prvom boot-u, pa hot_standby mode.
  # SELECT-i su dozvoljeni, INSERT/UPDATE/DELETE/DDL bacaju gresku ("cannot execute
  # ... in a read-only transaction"). Spring `routingDataSource` preusmerava
  # `@Transactional(readOnly = true)` zahteve ovde, write-ove na `db`.
  db_replica:
    image: postgres:16-alpine
    container_name: banka2_db_replica
    environment:
      PGUSER: banka2user
      PRIMARY_HOST: db
      PRIMARY_PORT: "5432"
      # Primary admin kredencijali — koriste se SAMO ako bootstrap script otkrije
      # da replication user/slot ne postoje na primary-ju (samo-ozdravnja kad je
      # raniji boot primary-ja pao na CRLF/bash^M init scriptu i propustio da
      # ih kreira). Vidi bootstrap-replica.sh `ensure_replication_setup`.
      PRIMARY_DB: banka2
      PRIMARY_USER: banka2user
      PRIMARY_PASSWORD: banka2pass
      REPLICATION_USER: replicator
      REPLICATION_PASSWORD: replicator_pass
      REPLICATION_SLOT: banka2_replica_slot
    volumes:
      - postgres_replica_data:/var/lib/postgresql/data
      - ./db-replica-init/bootstrap-replica.sh:/usr/local/bin/bootstrap-replica.sh:ro
    entrypoint: ["/usr/local/bin/bootstrap-replica.sh"]
    ports:
      - "6434:5432"  # host pristup repliki za eksterni debug (Adminer/psql).
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      # Replica je zdrava ako pg_isready prolazi I baza je u recovery mode-u.
      test: ["CMD-SHELL", "pg_isready -U banka2user -d banka2 && psql -U banka2user -d banka2 -tAc 'SELECT pg_is_in_recovery()' | grep -q 't'"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # trading_db - zasebna Postgres baza za trading-service (shared-nothing).
  trading_db:
    image: postgres:16-alpine
    container_name: banka2_trading_db
    environment:
      POSTGRES_DB: trading
      POSTGRES_USER: tradinguser
      POSTGRES_PASSWORD: tradingpass
    ports:
      - "6435:5432"
    volumes:
      - trading_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tradinguser -d trading"]
      interval: 10s
      timeout: 5s
      retries: 5

  adminer:
    image: adminer
    container_name: banka2_adminer
    environment:
      ADMINER_DEFAULT_SERVER: db
      ADMINER_DESIGN: pepa-linha
    # Adminer host port je env-driven (default 9001). Na Windows-u Hyper-V/WinNAT
    # cesto rezervise 8568-9167 opseg (Bug 12.05.2026: "ports are not available...
    # access permissions"). Default je 9001 jer to ima u CLAUDE.md istoriji,
    # ali svako moze override-ovati preko env var-a (npr. ADMINER_HOST_PORT=9200
    # za port iznad Hyper-V opsega).
    ports:
      - "${ADMINER_HOST_PORT:-9001}:8080"

  # Spring Boot backend
  backend:
    build:
      context: .
      dockerfile: banka2_bek/Dockerfile
    container_name: banka2_backend
    ports:
      # Gateway sada drzi host 8080. Backend je interno na 8080 (container),
      # host 8081 ostaje samo za direktan debug pristup monolitu.
      - "${BACKEND_HOST_PORT:-8081}:8080"
    environment:
      # Primary (read-write) — DDL + INSERT/UPDATE/DELETE + bilo sta van readOnly transakcija.
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/banka2
      SPRING_DATASOURCE_USERNAME: banka2user
      SPRING_DATASOURCE_PASSWORD: banka2pass
      SPRING_DATASOURCE_DRIVER_CLASS_NAME: org.postgresql.Driver
      # Read replica — koristi se za @Transactional(readOnly=true) putem
      # AbstractRoutingDataSource. Ako ${REPLICA_*} env vars nisu setovani,
      # Spring ce padnuti routing i sve ide na primary (graceful fallback).
      BANKA2_DATASOURCE_REPLICA_URL: jdbc:postgresql://db_replica:5432/banka2
      BANKA2_DATASOURCE_REPLICA_USERNAME: banka2user
      BANKA2_DATASOURCE_REPLICA_PASSWORD: banka2pass
      BANKA2_DATASOURCE_REPLICA_ENABLED: "true"
      # Pod-faza 2f cutover: InfluxDB (OHLCV time-series) je presao u
      # trading-service zajedno sa `timeseries` paketom — monolit (banka-core)
      # vise ne pristupa InfluxDB-u, pa nema ni BANKA2_INFLUX_* env-a ni
      # influxdb depends_on-a ovde.
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SPRING_JPA_SHOW_SQL: "false"
      SPRING_JPA_PROPERTIES_HIBERNATE_DIALECT: org.hibernate.dialect.PostgreSQLDialect
      SPRING_JPA_PROPERTIES_HIBERNATE_TYPE_PREFERRED_BOOLEAN_JDBC_TYPE: INTEGER
      # Auth rate limit (Bucket4j) — production radi 10 req/min/IP, ali za
      # E2E test sesije (Cypress live) capacity se podize na 100k da test
      # suite ne hituje 429. NAPOMENA: enabled MORA biti `true` jer
      # GlobalSecurityConfig konstruktorski zavisi od AuthRateLimitFilter
      # bean-a (nije Optional). Sa capacity=100k filter je no-op u praksi.
      AUTH_RATE_LIMIT_ENABLED: ${AUTH_RATE_LIMIT_ENABLED:-true}
      AUTH_RATE_LIMIT_CAPACITY: ${AUTH_RATE_LIMIT_CAPACITY:-100000}
      # Inter-bank protokol — Banka 1 (Tim 1) base URL. Tim 1 izlaze
      # nginx gateway na host portu 80. Iz nasi backend container-a
      # pristupamo preko host.docker.internal alias-a (extra_hosts).
      PARTNER1_BASE_URL: ${PARTNER1_BASE_URL:-http://host.docker.internal/}
      # Tim 1 user info endpoint je rerouted na /interbank/user/{rn}/{id}.
      PARTNER1_USER_PATH: ${PARTNER1_USER_PATH:-/interbank/user/{rn}/{id}}
      # Tim 1 routing broj
      PARTNER1_ROUTING: ${PARTNER1_ROUTING:-111}
      # Arbitro Phase 6 — Whisper STT sidecar (faster-whisper tiny, port 8094 na hostu).
      # Pokrece se kroz Banka-2-Tools/docker-compose.yml. Iz BE container-a
      # se pristupa preko host.docker.internal (isti pattern kao Ollama+TTS).
      # NOTE: host port 8094 (sidecar slusa 8093 unutar kontejnera) — 8093 zauzeo
      # `banka2_alert_router` u prometheus stack-u.
      # Ako Tools stack nije pokrenut, /assistant/chat-multipart graceful
      # fallback na "(audio fajl)" placeholder + Gemma native ASR.
      ARBITRO_WHISPER_URL: ${WHISPER_STT_URL:-http://host.docker.internal:8094}
      ARBITRO_WHISPER_ENABLED: ${WHISPER_STT_ENABLED:-true}
      ARBITRO_WHISPER_TIMEOUT_MS: ${WHISPER_STT_TIMEOUT_MS:-30000}
      # RabbitMQ — monolit publish-uje notifikacione poruke (Faza 1).
      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_RABBITMQ_PORT: "5672"
      SPRING_RABBITMQ_USERNAME: guest
      SPRING_RABBITMQ_PASSWORD: guest
      # Faza 2f — interbank paket zove trading-service /internal/portfolio/**
      # (portfolios/listings tabele zive u trading_db posle cutover-a).
      TRADINGSERVICE_BASE_URL: http://trading-service:8082
      # Interni seam X-Internal-Key — MORA biti isti string kao na
      # trading-service-u (oba smera /internal/** komunikacije). Monolit je
      # posle 2f-2 i pozivalac (interbank -> trading-service) i primalac
      # (trading-service -> banka-core), pa env mora biti simetrican: ako se
      # eksportuje pravi INTERNAL_API_KEY, mora stici i ovde, ne samo na
      # trading-service — inace TradingServiceClientConfig pada na dev default
      # i svaki interni poziv 401-uje.
      INTERNAL_API_KEY: ${INTERNAL_API_KEY:-dev-internal-key-rotate-in-prod}
    # host.docker.internal alias za pristup host portovima (Linux native Docker
    # zahteva eksplicitan host-gateway alias; Docker Desktop ima nativno).
    # Koristi se SAMO za opcioni Arbitro stack u Banka-2-Tools/docker-compose.yml
    # — BE pravi HTTP poziv na localhost:11434 / 8090 / 8091 ako je taj stack up.
    # Ako Arbitro stack nije pokrenut, pozivi puknu sa connection-refused i
    # /assistant/health vraca llmReachable=false (gracefuly).
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      db:
        condition: service_healthy
      db_replica:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    # Healthcheck — `wget` je u eclipse-temurin:25-jre image-u (busybox).
    # `/v3/api-docs` je openapi spec endpoint (dostupan bez auth-a po
    # GlobalSecurityConfig.java) — vraca 200 OK kad je Spring kontekst
    # potpuno load-ovan i Hibernate kreirao sve tabele. start_period
    # daje 60s grace pre nego sto retries broji (Spring Boot boot ~30s).
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/v3/api-docs > /dev/null"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 60s

  # InfluxDB 2.x — time-series baza za berzanske OHLCV podatke (Open/High/Low/Close/Volume).
  # Pod-faza 2f cutover: `timeseries` paket je presao u trading-service, pa je
  # InfluxDB sada konceptualno trading-service-ova baza (trading-service je
  # zapisuje OHLCV tickove). `banka2.influx.enabled=false` u trading-service-u
  # drzi InfluxConfig/Recorder bean-ove inertnim — InfluxDB kontejner je gore
  # i spreman, ali write-ovi se ukljucuju u Fazi 3.
  influxdb:
    image: influxdb:2.7-alpine
    container_name: banka2_influxdb
    environment:
      DOCKER_INFLUXDB_INIT_MODE: setup
      DOCKER_INFLUXDB_INIT_USERNAME: ${INFLUX_ADMIN_USER:-admin}
      DOCKER_INFLUXDB_INIT_PASSWORD: ${INFLUX_ADMIN_PASSWORD:-admin12345}
      DOCKER_INFLUXDB_INIT_ORG: ${INFLUX_ORG:-banka2}
      DOCKER_INFLUXDB_INIT_BUCKET: ${INFLUX_BUCKET:-tick-listings}
      DOCKER_INFLUXDB_INIT_RETENTION: 90d
      DOCKER_INFLUXDB_INIT_ADMIN_TOKEN: ${INFLUX_TOKEN:-dev-token-change-me-32-bytes-minimum}
    volumes:
      - influxdb_data:/var/lib/influxdb2
      - influxdb_config:/etc/influxdb2
    ports:
      - "8086:8086"
    healthcheck:
      test: ["CMD", "influx", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Seed data — ceka backend da kreira tabele pa ubaci podatke
  seed:
    image: postgres:16-alpine
    container_name: banka2_seed
    volumes:
      - ./seed.sql:/seed.sql:ro
    environment:
      PGPASSWORD: banka2pass
    entrypoint:
      - sh
      - -c
      - |
        echo 'Backend je healthy (kreirao tabele) — ubacujem seed...'
        psql -h db -U banka2user -d banka2 -v ON_ERROR_STOP=1 -f /seed.sql
        echo 'Seed uspesno ubasen!'
    depends_on:
      backend:
        # service_healthy ceka backend healthcheck → 200 OK na /v3/api-docs.
        # Ranije je seed imao `sleep 40` + 15× retry petlju da pogadja kad su
        # tabele kreirane; sad je determinisicki — pokrece se TEK kad backend
        # potvrdi da je load-ovan.
        condition: service_healthy

  # Trading seed — pod-faza 2f cutover. Ubacuje trgovinski seed u trading_db
  # posle sto trading-service kreira tabele (ddl-auto=update). Mirror `seed`
  # servisa: ceka trading-service healthy pa pokrene psql sa ON_ERROR_STOP.
  # `exchanges`/`exchange_holidays` se NE seed-uju ovde — radi ih ExchangeSeedData
  # (ApplicationRunner) unutar trading-service-a; trading-seed.sql ima samo
  # ostale trgovinske tabele (listings/orders/portfolios/funds/...).
  seed-trading:
    image: postgres:16-alpine
    container_name: banka2_seed_trading
    volumes:
      - ./trading-seed.sql:/trading-seed.sql:ro
    environment:
      PGPASSWORD: tradingpass
    entrypoint:
      - sh
      - -c
      - |
        echo 'Trading-service je healthy (kreirao tabele) — ubacujem trading seed...'
        psql -h trading_db -U tradinguser -d trading -v ON_ERROR_STOP=1 -f /trading-seed.sql
        echo 'Trading seed uspesno ubasen!'
    depends_on:
      trading-service:
        # service_healthy ceka trading-service healthcheck — Spring Boot port
        # otvoren -> Hibernate ddl-auto kreirao sve trgovinske tabele.
        condition: service_healthy

  # RabbitMQ - async broker. Faza 0: prisutan ali jos neiskoriscen.
  # Management UI na 15672 (guest/guest).
  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: banka2_rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # nginx api-gateway - jedini spolja izlozen ulaz. Zauzima host 8080
  # (stari port monolita) pa se FE/Mobile konfiguracija ne menja.
  # Pod-faza 2f cutover: gateway path-routing-uje trgovinske prefikse na
  # trading-service:8082, ostalo na backend:8080 (vidi api-gateway/nginx.conf).
  api-gateway:
    build: ./api-gateway
    container_name: banka2_gateway
    ports:
      - "${GATEWAY_HOST_PORT:-8080}:80"
    depends_on:
      backend:
        condition: service_healthy
      trading-service:
        condition: service_healthy
    healthcheck:
      # 127.0.0.1 (ne localhost): busybox wget bi za `localhost` probao IPv6 ::1,
      # a nginx slusa samo IPv4 0.0.0.0:80 -> healthcheck bi "Connection refused"-ovao.
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/v3/api-docs > /dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 20s

  # trading-service - pod-faza 2f cutover: live vlasnik trgovinskog domena
  # (orderi, portfolio, listings, OTC, fondovi, porez, aktuari, opcije, margin)
  # iza api-gateway-a. Sopstvena baza trading_db, JWT, BankaCoreClient.
  trading-service:
    build:
      context: .
      dockerfile: trading-service/Dockerfile
    container_name: banka2_trading
    ports:
      - "8082:8082"
    environment:
      TRADING_DB_URL: jdbc:postgresql://trading_db:5432/trading
      TRADING_DB_USER: tradinguser
      TRADING_DB_PASSWORD: tradingpass
      JWT_SECRET: ${JWT_SECRET:-dev-only-jwt-secret-do-not-use-in-prod-rotate-via-env-var-on-each-deploy}
      INTERNAL_API_KEY: ${INTERNAL_API_KEY:-dev-internal-key-rotate-in-prod}
      BANKACORE_BASE_URL: http://backend:8080
      # RabbitMQ — pod-faza 2f-5a: trading-service publish-uje
      # MARGIN_ACCOUNT_BLOCKED poruku ka notification-service (cross-JVM).
      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_RABBITMQ_PORT: "5672"
      SPRING_RABBITMQ_USERNAME: guest
      SPRING_RABBITMQ_PASSWORD: guest
      # InfluxDB — `timeseries` paket je presao u trading-service (pod-faza 2f).
      # `banka2.influx.enabled=false` drzi InfluxConfig/Recorder bean-ove
      # inertnim (ConditionalOnProperty) — kontejner je gore, write-ovi
      # OHLCV tickova se ukljucuju u Fazi 3.
      BANKA2_INFLUX_URL: http://influxdb:8086
      BANKA2_INFLUX_TOKEN: ${INFLUX_TOKEN:-dev-token-change-me-32-bytes-minimum}
      BANKA2_INFLUX_ORG: ${INFLUX_ORG:-banka2}
      BANKA2_INFLUX_BUCKET: ${INFLUX_BUCKET:-tick-listings}
      BANKA2_INFLUX_ENABLED: "false"
    depends_on:
      trading_db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      influxdb:
        condition: service_healthy
    healthcheck:
      # eclipse-temurin:25-jre runtime nema curl/wget; bash /dev/tcp proverava
      # da je Spring Boot HTTP port otvoren (dovoljan health signal za shell).
      test: ["CMD-SHELL", "bash -c '</dev/tcp/127.0.0.1/8082' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 30s

  # notification-service - Faza 1: konzumira RabbitMQ notifikacione poruke i salje email-ove.
  notification-service:
    build:
      context: .
      dockerfile: notification-service/Dockerfile
    container_name: banka2_notification
    ports:
      - "8083:8083"
    environment:
      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_RABBITMQ_PORT: "5672"
      SPRING_RABBITMQ_USERNAME: guest
      SPRING_RABBITMQ_PASSWORD: guest
      MAIL_USERNAME: ${MAIL_USERNAME:-banka2.notifications@gmail.com}
      MAIL_PASSWORD: ${MAIL_PASSWORD:-}
      NOTIFICATION_ACTIVATION_URL_BASE: http://localhost:3000
      NOTIFICATION_PASSWORD_RESET_URL_BASE: http://localhost:3000
    depends_on:
      rabbitmq:
        condition: service_healthy
    healthcheck:
      # eclipse-temurin:25-jre runtime nema curl/wget; bash /dev/tcp proverava
      # da je Spring Boot HTTP port otvoren (dovoljan health signal za shell).
      test: ["CMD-SHELL", "bash -c '</dev/tcp/127.0.0.1/8083' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 30s

volumes:
  postgres_data:
  postgres_replica_data:
  influxdb_data:
  influxdb_config:
  trading_db_data:
