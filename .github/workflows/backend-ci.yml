name: backend-ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: banka2_bek
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: temurin
          cache: maven
          cache-dependency-path: banka2_bek/pom.xml

      - name: Build project
        run: chmod +x mvnw && ./mvnw compile -q

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: banka2_bek
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: temurin
          cache: maven
          cache-dependency-path: banka2_bek/pom.xml

      - name: Run tests
        run: chmod +x mvnw && ./mvnw test

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: jacoco-report
          path: banka2_bek/target/site/jacoco/

  lint:
    name: Checkstyle Lint
    runs-on: ubuntu-latest
    continue-on-error: true
    defaults:
      run:
        working-directory: banka2_bek
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: temurin
          cache: maven
          cache-dependency-path: banka2_bek/pom.xml

      - name: Run Checkstyle
        run: chmod +x mvnw && ./mvnw checkstyle:check

  build-docker:
    name: Build Docker Image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t banka2-bek:ci-test banka2_bek/