name: backend-ci

on:
  push:
    branches: [main]
    paths:
      - 'banka2_bek/**'
      - 'banka2-contracts/**'
      - 'pom.xml'
      - '.github/workflows/backend-ci.yml'
      - '.github/workflows/backend-cd.yml'
      - 'k8s/**'
      - 'Banka-2-Tools/**'
      - 'monitoring/**'
      - 'docker-compose.yml'
  pull_request:
    paths:
      - 'banka2_bek/**'
      - 'banka2-contracts/**'
      - 'pom.xml'
      - '.github/workflows/backend-ci.yml'
      - '.github/workflows/backend-cd.yml'
      - 'k8s/**'
      - 'Banka-2-Tools/**'
      - 'monitoring/**'
      - 'docker-compose.yml'
  workflow_dispatch:

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: temurin
          cache: maven
          cache-dependency-path: banka2_bek/pom.xml

      # -am (also-make) gradi upstream reactor module (banka2-contracts) pre banka2_bek-a,
      # jer banka2_bek zavisi od banka2-contracts:0.0.1-SNAPSHOT (NotificationMessage / NotificationRabbit).
      # Pokrecemo iz root-a reactor-a tako da Maven moze da razresi sibling module.
      - name: Build project
        run: mvn -B -pl banka2_bek -am compile -q

  test:
    name: Unit Tests + Coverage Gate
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: temurin
          cache: maven
          cache-dependency-path: banka2_bek/pom.xml

      # `mvn verify` (umesto cisto `mvn test`) pokrece i `verify` fazu u kojoj
      # JaCoCo `check` execution proverava 80% line coverage threshold.
      # `haltOnFailure=true` u pom.xml znaci da build PUCA ako padne ispod —
      # CI tako enforce-uje KT3 zahtev za 80% coverage.
      # -am da banka2-contracts bude install-ovan u local repo pre testova banka2_bek-a.
      - name: Run tests + JaCoCo coverage gate
        run: mvn -B -pl banka2_bek -am verify

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: jacoco-report
          path: banka2_bek/target/site/jacoco/

  lint:
    name: Checkstyle Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: temurin
          cache: maven
          cache-dependency-path: banka2_bek/pom.xml

      # Pre 03.05.2026 ovo je bilo `mvn checkstyle:check || true` sa
      # `continue-on-error: true` — efektivno no-op. Sada CI puca ako
      # ima checkstyle violation-a (lokalni `./mvnw checkstyle:check` vec
      # treba da prodje sa 0 violations).
      # Checkstyle samo cita izvore, ne treba -am (ne zahteva compile sibling-a).
      - name: Run Checkstyle
        run: mvn -B -pl banka2_bek checkstyle:check

  spotbugs:
    name: "SpotBugs + FindSecBugs (SAST: code-pattern scan)"
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: temurin
          cache: maven
          cache-dependency-path: banka2_bek/pom.xml

      # SpotBugs sa FindSecBugs plugin-om detektuje ~140 security bug obrazaca:
      # SQL injection (SQL_INJECTION_*), XSS (XSS_*), weak crypto (WEAK_*),
      # hardcoded secrets (HARD_CODE_*), SSRF (URL_REWRITTEN), itd.
      # `failOnError=false` u pom.xml — surface findings in artifact, ne pucamo build za sad.
      # Trazi `target/spotbugsXml.xml` u artifact-ima posle CI run-a.
      # -am da banka2-contracts klase budu kompajlovane (SpotBugs cita .class fajlove).
      - name: Run SpotBugs + FindSecBugs
        run: mvn -B -pl banka2_bek -am compile spotbugs:check
        continue-on-error: true

      - name: Upload SpotBugs report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: spotbugs-report
          path: banka2_bek/target/spotbugsXml.xml
          if-no-files-found: ignore

  dep-check:
    name: "OWASP Dependency Check (SAST: CVE scan)"
    runs-on: ubuntu-latest
    needs: build
    # Dnevni cron — NVD CVE feed je veliki (~500 MB), pokrecemo samo na main push
    # i nedeljni schedule. PR-ovi koriste npm audit + maven dep:tree analizu.
    if: github.event_name == 'push' || github.event_name == 'schedule'
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: temurin
          cache: maven
          cache-dependency-path: banka2_bek/pom.xml

      - name: Cache OWASP NVD database
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository/org/owasp/dependency-check-data
          key: dependency-check-${{ runner.os }}-v12

      # `failBuildOnCVSS=7` u pom.xml: pucamo na high (CVSS >= 7.0) i critical
      # CVE-jeve. medium (4.0-6.9) i low (0.1-3.9) idu samo u report.
      # NVD API key (opciono — ali bez njega NVD download je rate-limited
      # 10 req/30s, sto produzava prvi build na ~15 min):
      # 1. Trazi besplatan API key na https://nvd.nist.gov/developers/request-an-api-key
      # 2. U GitHub repo: Settings → Secrets → Actions → "New repository secret"
      # 3. Name: NVD_API_KEY, Value: <tvoj-uuid-iz-emaila>
      # Sa key-om, NVD download ide ~3 min umesto 15 min.
      # -am da banka2-contracts bude install-ovan u local repo pre dep-check-a.
      - name: Run OWASP Dependency Check
        run: mvn -B -pl banka2_bek -am dependency-check:check -DskipDepCheck=false
        env:
          NVD_API_KEY: ${{ secrets.NVD_API_KEY }}
        continue-on-error: true

      - name: Upload Dependency Check report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: dependency-check-report
          path: banka2_bek/target/dependency-check-report.html
          if-no-files-found: ignore

  docker-build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Dockerfile multi-stage build (banka2_bek/Dockerfile) referencira
      # banka2-contracts/pom.xml + root pom.xml — sibling module-i moraju biti
      # dostupni u kontekstu. Zato context = '.' (root reactor-a), ne './banka2_bek'.
      - name: Build Docker image (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./banka2_bek/Dockerfile
          push: false
          tags: banka2-bek:ci-test
          cache-from: type=gha
          cache-to: type=gha,mode=max
