name: trading-service-ci

on:
  push:
    branches: [main]
    paths:
      - 'trading-service/**'
      - 'banka2-contracts/**'
      - 'pom.xml'
      - '.github/workflows/trading-service-ci.yml'
  pull_request:
    paths:
      - 'trading-service/**'
      - 'banka2-contracts/**'
      - 'pom.xml'
      - '.github/workflows/trading-service-ci.yml'
  workflow_dispatch:

jobs:
  build-test:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: temurin
          cache: maven
          cache-dependency-path: trading-service/pom.xml

      - name: Build & test trading-service
        # -am gradi upstream reactor module (banka2-contracts) pre trading-service
        run: mvn -B -pl trading-service -am verify
