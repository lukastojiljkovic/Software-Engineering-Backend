name: spark-jobs CD

on:
  push:
    branches: [main]
    paths:
      - 'spark/**'

permissions:
  contents: read
  packages: write

jobs:
  docker-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build & Push spark-jobs
        uses: docker/build-push-action@v6
        with:
          context: ./spark
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/banka-2-spark-jobs:latest
            ghcr.io/${{ github.repository_owner }}/banka-2-spark-jobs:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
