name: spark-jobs CD

on:
  push:
    branches: [main]
    paths:
      - 'spark/**'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  docker-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      # GHCR zahteva lowercase repository owner — `RAF-SI-2025` → `raf-si-2025`.
      # Bez ovog: docker push moze odbijati ili kreirati duplikat path-ove.
      - name: Convert repository owner to lowercase
        id: string
        run: echo "lowercase=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT
      - name: Build & Push spark-jobs
        uses: docker/build-push-action@v7
        with:
          context: ./spark
          push: true
          tags: |
            ghcr.io/${{ steps.string.outputs.lowercase }}/banka-2-spark-jobs:latest
            ghcr.io/${{ steps.string.outputs.lowercase }}/banka-2-spark-jobs:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
