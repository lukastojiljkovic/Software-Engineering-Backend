name: notification-service-cd

# CI-02: CD ne sme da push-uje `:latest` image ako CI nije prosao.
# `workflow_run` trigger ceka da `notification-service-ci` workflow zavrsi sa
# `conclusion == 'success'` pa onda pokreneme build & push. Time se
# eliminise race condition u kojem broken commit pushuje broken sliku
# pre nego sto CI uopste stigne da fail-uje (npr. compile/test/lint).
on:
  workflow_run:
    workflows: ["notification-service-ci"]
    branches: [main]
    types: [completed]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io

jobs:
  docker-push:
    name: Build & Push banka-2-notification-service
    runs-on: ubuntu-latest
    # CI-02: pokrece se SAMO ako je upstream `notification-service-ci` workflow uspesan.
    # `workflow_run` event uvek fire-uje (success ili failure), pa job-ovi
    # moraju eksplicitno da provere conclusion preko `github.event.workflow_run`.
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    steps:
      - uses: actions/checkout@v5

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Convert repository owner to lowercase
        id: string
        run: echo "lowercase=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      - name: Build & Push notification-service
        # Build kontekst je root repo-a (.) jer notification-service Dockerfile
        # pull-uje pom.xml-ove iz vise modula (banka2-contracts, notification-service)
        # iz Banka-2-Backend aggregator-a.
        uses: docker/build-push-action@v7
        with:
          context: .
          file: notification-service/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ steps.string.outputs.lowercase }}/banka-2-notification-service:latest
            ghcr.io/${{ steps.string.outputs.lowercase }}/banka-2-notification-service:${{ github.sha }}
          cache-from: type=gha,scope=notification-service
          cache-to: type=gha,mode=max,scope=notification-service
