name: backend-cd

on:
  push:
    branches: [main]

permissions:
  contents: read
  packages: write

jobs:
  docker-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: banka2_bek
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/banka2-bek:latest
            ghcr.io/${{ github.repository }}/banka2-bek:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max