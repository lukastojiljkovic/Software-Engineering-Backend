name: backend-cd

# CI-02: CD ne sme da push-uje `:latest` image ako CI nije prosao.
# `workflow_run` trigger ceka da `backend-ci` workflow zavrsi sa
# `conclusion == 'success'` pa onda pokreneme build & push. Time se
# eliminise race condition u kojem broken commit pushuje broken sliku
# pre nego sto CI uopste stigne da fail-uje (npr. compile/test/lint).
on:
  workflow_run:
    workflows: ["backend-ci"]
    branches: [main]
    types: [completed]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io

jobs:
  # ============================================================
  # Glavni BE image (Spring Boot + Java 25)
  # ============================================================
  backend:
    name: Build & Push banka-2-backend
    runs-on: ubuntu-latest
    # CI-02: pokrece se SAMO ako je upstream `backend-ci` workflow uspesan.
    # `workflow_run` event uvek fire-uje (success ili failure), pa job-ovi
    # moraju eksplicitno da provere conclusion preko `github.event.workflow_run`.
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    steps:
      - uses: actions/checkout@v5

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Convert repository owner to lowercase
        id: string
        run: echo "lowercase=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      # Dockerfile multi-stage build (banka2_bek/Dockerfile) referencira
      # banka2-contracts/pom.xml + root pom.xml — sibling module-i moraju biti
      # dostupni u kontekstu. Zato context = '.' (root reactor-a), ne './banka2_bek'.
      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./banka2_bek/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ steps.string.outputs.lowercase }}/banka-2-backend:latest
            ghcr.io/${{ steps.string.outputs.lowercase }}/banka-2-backend:${{ github.sha }}
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend

  # ============================================================
  # Banka-2-Tools sidecari (Arbitro AI bonus stack)
  # 3 custom image-a koja gradimo: rag-tool, wikipedia-tool, kokoro-tts.
  # Ollama image je `ollama/ollama:latest` (Dockerhub) — ne build-ujemo.
  # ============================================================
  tools:
    name: Build & Push ${{ matrix.image }}
    runs-on: ubuntu-latest
    # CI-02: gate na uspesan backend-ci.
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: banka-2-rag-tool
            context: ./Banka-2-Tools/rag-service
          - image: banka-2-wikipedia-tool
            context: ./Banka-2-Tools/wikipedia-service
          - image: banka-2-kokoro-tts
            context: ./Banka-2-Tools/kokoro-tts
          - image: banka-2-whisper-stt
            context: ./Banka-2-Tools/whisper-stt
    steps:
      - uses: actions/checkout@v5

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Convert repository owner to lowercase
        id: string
        run: echo "lowercase=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: ${{ matrix.context }}
          push: true
          tags: |
            ghcr.io/${{ steps.string.outputs.lowercase }}/${{ matrix.image }}:latest
            ghcr.io/${{ steps.string.outputs.lowercase }}/${{ matrix.image }}:${{ github.sha }}
          cache-from: type=gha,scope=${{ matrix.image }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image }}

  # ============================================================
  # Ollama pre-baked sa Gemma 4 E2B + derived gemma4:e2b-gpu (num_gpu=999)
  # Image se gradi iz `Banka-2-Tools/ollama/Dockerfile` koji pull-uje
  # model TOKOM build-a i kreira derived varijantu. Idiot-proof: korisnik
  # `docker compose pull && up -d` dobija odmah upotrebljiv LLM.
  # ============================================================
  ollama:
    name: Build & Push banka-2-ollama (pre-baked Gemma)
    runs-on: ubuntu-latest
    # CI-02: gate na uspesan backend-ci.
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v5

      - name: Free up disk space (image je ~10GB unpacked)
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL
          docker image prune -af
          df -h /

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Convert repository owner to lowercase
        id: string
        run: echo "lowercase=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      - name: Build and push (Dockerfile pull-uje + create derived model unutra)
        uses: docker/build-push-action@v7
        with:
          context: ./Banka-2-Tools/ollama
          push: true
          tags: |
            ghcr.io/${{ steps.string.outputs.lowercase }}/banka-2-ollama:latest
            ghcr.io/${{ steps.string.outputs.lowercase }}/banka-2-ollama:${{ github.sha }}
          # Cache se NE koristi za ollama — model layer je 7GB i GHA cache
          # ima 10GB limit; brzo ga popunis i nemas mesta za druge layer-e.
          # Build je dugacak (~10-15min) ali ide jednom po push-u na main.

  # ============================================================
  # Monitoring stack (MLA bonus)
  # 1 custom image: alert-router. Prometheus, Grafana, AlertManager su
  # javni image-i sa Dockerhub-a (`prom/prometheus`, `grafana/grafana`,
  # `prom/alertmanager`). NAPOMENA: alert-router build context je
  # `Banka-2-Tools/alert-router-service` (re-use sidecar layout iz Tools-a).
  # ============================================================
  monitoring:
    name: Build & Push banka-2-alert-router
    runs-on: ubuntu-latest
    # CI-02: gate na uspesan backend-ci.
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    steps:
      - uses: actions/checkout@v5

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Convert repository owner to lowercase
        id: string
        run: echo "lowercase=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: ./Banka-2-Tools/alert-router-service
          push: true
          tags: |
            ghcr.io/${{ steps.string.outputs.lowercase }}/banka-2-alert-router:latest
            ghcr.io/${{ steps.string.outputs.lowercase }}/banka-2-alert-router:${{ github.sha }}
          cache-from: type=gha,scope=alert-router
          cache-to: type=gha,mode=max,scope=alert-router
